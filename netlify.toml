[functions]
  directory = "netlify/functions"
  external_node_modules = ["express", "mysql2", "bcryptjs", "jsonwebtoken"]
  node_bundler = "esbuild"

[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/api/:splat"

[build]
  command = "echo 'Building functions'"
  publish = "public"